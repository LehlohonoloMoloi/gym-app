spring:
  application:
    name: gym-app

  datasource:
    url: jdbc:postgresql://{DB_SERVER:localhost:5432}/{DB_NAME:gymdb}
    username: {DB_USERNAME:postgres}
    password: {DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081
