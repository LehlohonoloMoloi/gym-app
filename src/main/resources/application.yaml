spring:
  application:
    name: gym-app

  datasource:
    url: jdbc:postgresql://${DB_SERVER}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

jwt:
  secret-key: ${JWT_SECRET}
  expiration-ms: 3600000 # 1 hour in milliseconds

logging:
  level:
    org:
      springframework:
        security: DEBUG
